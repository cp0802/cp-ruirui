syntax = "proto2";

option java_outer_classname = "AdanxingDeviceProto";

package com.adanxing.ad.device.proto;

message Device {
    optional string imei = 1;
    optional string imei_md5 = 2;
    optional string oaid = 3;
    optional string idfa = 5;
    optional string android_id = 6;
    optional string mac = 7;
    optional string make = 8;
    optional string brand = 9;
    optional string model = 10;
    optional string ua = 11;
    optional string s_width = 12;
    optional string s_height = 13;
    optional int32 os = 14;
    optional string osv = 15;
    optional int64 ip = 16;
    optional int64 address_id = 17;
    optional string bm = 18;
    optional string um = 19;
    optional int64 log_time = 20;
    optional string carrier = 21;
    repeated int64 source_ids = 22;
    optional int64 source_id = 23;
    optional int64 media_id = 24;
    optional string caid = 25;
    optional CaidPro caid_pro = 26;
    optional string paid = 27;
    optional string mac_md5 = 28;
    optional int32 width = 29;
    optional int32 height = 30;
    optional int32 device_type = 31;
    optional string caid_version = 32;
    optional string pre_caid = 33;
    optional string pre_caid_version = 34;

}

message UserTag {
    optional string did = 1;
    optional int64 did_type = 2;
    optional int64 age = 3;
    optional int64 sex = 4;
	repeated HourTag hourTag = 5;
}
message HourTag {
	optional int64 age = 1;
    optional int64 sex = 2;
	repeated string hour = 3; //ta 识别的小时列表
}

message Tag {
    optional int32 age=1; // 1 秒针未识别
    optional int32 sex = 2; // 1 秒针未识别
}

message Crowd {
    repeated int32 crowd_id = 1;
}

message DeviceAndroidId {
    optional string imei_md5 = 1;
    optional string oaid = 2;
    optional int64 media_id = 3;
}

message DevicePropertyFeature {
    optional int32 did_type = 1;
    optional string did = 2;
    optional bool ssp_flag = 3;
    optional bool dsp_flag = 4;
}

message XDPI {
    optional string ip = 1;
    optional int64 log_time = 2;
    optional int64 off_time = 3;
}

message CaidPro {
    optional string boot_time_in_sec = 1; // iOS设备启动时间
    optional string country_code = 2; // 国家
    optional string language = 3; // 语言
    optional string device_name = 4; // 设备名称
    optional string model = 5; // 设备model
    optional string system_version = 6; // 系统版本
    optional string machine = 7; // 设备machine
    optional string carrier_info = 8; // 运营商
    optional string memory = 9; // 物理内存量
    optional string disk = 10; // 硬盘容量
    optional string sys_file_time = 11; // 系统更新时间
    optional string time_zone = 12; // 时区
    optional string init_time = 13; // 合规信息中的应用首次启动时间
}

message DmpExt {
    optional int32 pdd_value = 1;
}

message DeviceExt {
    repeated AdvertiserFeature advertiser_feature = 1; // 广告主策略
}

message AdvertiserFeature {
    optional int32 feature_type = 1; // 策略类型
    optional int64 log_time = 2; // 记录时间
    optional int64 expire_time = 3; // 过期时间
}

message AdTrack {
    optional string request_id = 1;
    optional int64 log_time = 2;
    optional int64 media_id = 3;
    optional string ad_id = 4;
    optional string bundle = 5;
    optional int64 advertiser_id = 6;
    optional int64 rel_id = 7;
    optional int64 ad_campaign_id = 8;
    optional int64 ad_group_id = 9;
    optional string did = 10;
    optional int32 did_type = 11;
    optional string idfa_md5 = 12;
    optional string caid = 13;
    optional string oaid_md5 = 14;
    optional string imei_md5 = 15;
    optional int64 advertiser_bid = 16;
    optional int64 media_bid = 17;
    optional string media_request_id = 18; // 媒体请求id
    optional int64 cpa_campaign_id = 19; // cpa计划id
    optional int64 material_id = 20; // 素材id
    optional int64 cpa_account_id = 21; // cpa账号id
    optional int32 cpa_business_id = 22; // cpa业务id
    optional string ssp_adsense_id = 23;
    optional string ssp_bundle = 24;
    optional string task_id = 25; // 任务id
}

message UserExt {
    optional int64 log_time = 1;
    optional string did = 2;
    optional int32 did_type = 3;
    optional UserTrackStatics qihang_user_track = 4;
}

message UserTrackStatics {
    optional int32 impCount = 1;
    optional int32 clickCount = 2;
    optional int32 deepCount = 3;
    optional int32 firstDeepCount = 4;
}

message MiaoZhenTag {
    optional int32 age = 1;
    optional int32 sex = 2;
    repeated HourTag hourTag = 3;
    optional int64 log_time = 4;

}

message MediaTag {
    optional int32 age = 1;
    optional int32 sex = 2;
    optional int64 log_time = 3;
}

message QihangUserData {
    optional int32 requestCount = 1;
    optional int32 resultCount = 2;
    optional int32 maxBid = 3;
    optional int32 minBid = 4;
    optional int64 log_time = 5;
}

message SdkCheckResult {
    optional int32 errorUa = 1;
    optional int32 webNull = 2;
    optional int32 loadUrlNull = 3;
    optional int32 spRtb = 4;
    optional int64 log_time = 5;
}

message TanxFeature {
    // 过滤记录时间
    optional int64 log_time_millions = 1;
    optional int32 advertiser_id = 2;
    optional int32 advertiser_status_code = 3;
}

message JDFeature {
    // 过滤记录时间
    optional int64 log_time_millions = 1;
    optional int32 advertiser_id = 2;
    optional int32 advertiser_status_code = 3;
    optional int32 low_bid_log_time_seconds = 4; // 低质量用户记录时间-秒
    optional int32 log_bid_count = 5; // 低质量竞价数量
    optional int32 max_bid_log_time_seconds = 6; // 有效出价记录时间-秒
    optional int32 max_bid = 7; // 有效出价
}

message QihangFeature {
    // 启航过滤时间
    optional int64 ignore_time_millions = 1;
}

message MeituanFeature {
    // 启航过滤时间
    optional int64 ignore_time_millions = 1;
}

message ImpFeature {
    optional int64 time_millions = 1;
    repeated ImpFeatureDetail imp_feature_campaign = 2;
    repeated ImpFeatureDetail imp_feature_group = 3;
    repeated ImpFeatureDetail imp_feature_ssp_project = 4;
    message ImpFeatureDetail {
        optional int64 id = 1;
        optional int32 count = 2;
    }
}

message PddFeature {
    optional int32 bid_count = 1; // 请求量级
    optional int64 last_req_time_millions = 2; // 最后请求时间
    optional int64 last_ignore_time_millions = 3; // 最后黑名单时间
    optional int32 last_update_time_millions = 4;
    optional int32 click_time_seconds = 5; // 最后点击时间
}

message DouYuDeviceInfo {
    optional OsType os_type = 1;
    optional int32 width = 2;
    optional int32 height = 3;
    optional float density = 4;
    optional string caid = 5;
    optional string caid_version = 6;
    optional CaidPro caid_pro = 7;
    optional int32 last_log_time_millions = 8;
    optional string ua = 9;
}

enum OsType {
    ANDROID = 1;
    IOS = 2;
}

message AxDeviceInfo {
    map<int32, int32> media_update_time_seconds = 1; // 媒体最后更新时间-秒
}

message ScoreInfo {
    optional int32 score = 1; // 分值
    optional int32 log_time = 2; // 最后记录时间
}

message DhhTask {
    optional int32 log_time = 1; // 记录时间
    repeated int64 task_id = 2; // 任务id
    optional int32 tranform_first_deep_time = 3; // 记录最新首唤时间
    optional int32 last_click_time = 4; // 最后点击时间
    optional int32 click_count = 5; // 点击次数
    optional int32 last_imp_time = 6; // 最后曝光时间
    optional int32 imp_count = 7; // 曝光次数
}

message AlipayTask {
    optional int32 log_time = 1; // 记录时间
    map<string, string> task_bid = 2; // 任务id_参竞
    optional int32 tranform_first_deep_time = 3; // 记录最新首唤时间
    optional int32 last_click_time = 4; // 最后点击时间
    optional int32 click_count = 5; // 点击次数
    optional int32 last_imp_time = 6; // 最后曝光时间
    optional int32 imp_count = 7; // 曝光次数
}

message MaterialTask {
    optional int32 log_time = 1; // 记录时间
    repeated MaterialImp media_material_imp = 2; // 媒体素材曝光
}

message MaterialImp {
    optional int64 material_id = 1; // 素材id
    optional int32 imp_count = 2; // 曝光次数
    optional int32 media_id = 3; // 媒体id
}

message DeviceDeepFeature {
    optional int32 log_time = 1; // 统计时间
    repeated DeviceDeepInfo device_deep_info = 2; // 设备唤端数据统计
}

message DeviceDeepInfo {
    optional DeviceDeepBusinessId device_business_id = 1; // 统计类型
    optional int32 click_count = 2; // 点击数
    optional int32 deep_count = 3; // 唤端数
}

enum DeviceDeepBusinessId {
    QH = 1; // 启航
    ALIPAY = 2; // 支付宝
}

message DeviceInstallFeature {
    optional int32 log_time = 1; // 统计时间
    map<int32, DeviceInstallAppInfo> device_install_app = 2; // 安装态
}

message DeviceInstallAppInfo {
    optional int32 log_time = 1; // 统计时间
    repeated int32 install_app_id = 2; // 安装态标识
}

message MeituanTask {
    optional int32 log_time = 1; // 记录时间
    repeated int64 promotion_target_id = 2; // 项目id
    optional int32 tranform_first_deep_time = 3; // 记录最新首唤时间
    optional int32 last_click_time = 4; // 最后点击时间
    optional int32 click_count = 5; // 点击次数
    optional int32 last_imp_time = 6; // 最后曝光时间
    optional int32 imp_count = 7; // 曝光次数
}

message TBCpsTask {
    optional int32 log_time = 1; // 记录时间
    repeated int64 strategy_id = 2; // 策略id
    optional int32 tranform_first_deep_time = 3; // 记录最新首唤时间
    optional int32 last_click_time = 4; // 最后点击时间
    optional int32 click_count = 5; // 点击次数
    optional int32 last_imp_time = 6; // 最后曝光时间
    optional int32 imp_count = 7; // 曝光次数
    repeated TBCpsRta rta_id = 8; // rta信息
}

message TBCpsRta {
    optional int32 log_time = 1; // 记录时间
    optional string rta_id = 2; // rta_id
    optional int32 status = 3; //状态码
}

message AppAd {
    optional int32 log_time = 1; // 记录时间
    repeated Ad ad = 2; // app广告列表
}

message Ad {
    optional int32 material_type = 1; // 素材类型
    optional Image image = 2; // 图片
    optional Video video = 3; // 视频
    optional string title = 4; // 标题
    optional string sub_title = 6; // 子标题
    optional string description = 7; // 描述
    optional string brand_name = 8; // 品牌名称
    optional Image icon = 9; // 图标
    optional string landding_url = 10; // 落地页地址
    optional string deep_link = 11; // deep_link
    optional string universal_link = 12; // ulk
}

message Image {
    optional string url = 1; // 图片地址
    optional int32 width = 2; // 宽度
    optional int32 height = 3; // 高度
    optional int32 size = 4; // 大小（字节)
}

message Video {
    optional string url = 1; // 图片地址
    optional int32 width = 2; // 宽度
    optional int32 height = 3; // 高度
    optional int32 size = 4; // 大小（字节)
    optional int32 duration = 5; // 视频码率
}

message OttMobDevice {
     optional string ott_did = 1;
     optional int32 ott_did_type = 2;
     optional string mob_did = 3;
     optional int32 mob_did_type = 4;
}

message XIpExtDevice {
    repeated XOttMobDevice x_ott_mob_device = 1; // 设备信息列表
}

message XOttMobDevice {
    optional int32 init_time = 1; // 初始化时间
    optional int32 log_time = 2; // 最后记录时间
    optional int32 did_type = 3; // 设备类型
    optional string did = 4; // 设备信息
    optional int32 log_count = 5; // 映射次数
    optional Device ott_device = 6; // 设备信息-ott
    optional Device mob_device = 7; // 设备信息-mob
    optional string mob_did = 8;
    optional int32 mob_did_type = 9;
}

message XDeviceIpLog {
    optional int32 init_time = 1; // 初始化时间
    optional int32 log_time = 2; // 最后记录时间
    optional int64 ip_long = 3; // ip地址
}

