server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  tomcat:
    uri-encoding: UTF-8
    threads:
      # 根据 CPU 核心数调整，通常 4 核 8 线程的机器，核心数设置 200-400 足够了
      min-spare: 200           # 最小工作线程
      max: 2000                # 最大工作线程
    max-connections: 10000      # 稍微降低一点，让压力反馈更明显
    accept-count: 5000          # **关键修改**：从 100000 降到 5000
    # 如果请求在队列中排队超过 2 秒，直接拒绝，避免上游超时
    connection-timeout: 2000ms  # 连接建立的超时时间
logging:
  level:
    root: info
    com.adanxing.ad: debug
spring:
  app-version: 1.0.1
  http:
    encoding:
      force: true
      charset: UTF-8
      enabled: true
  profiles:
    active: dev

